input_url: rtsp://1c4.local:8554/nursery
output_url: rtsp://1c4.local:8554/nursery-heart
roi:
  x: 100
  y: 90
  width: 320
  height: 180
processing:
  fps: 15
  min_bpm: 80
  max_bpm: 200
  window_seconds: 20
  use_opencl: true
breathing:
  enabled: true
  min_bpm: 8
  max_bpm: 35
  window_seconds: 30
  max_signal_delta: 20
  min_confidence: 0.0
output:
  width: 1152
  height: 648
snapshot:
  enabled: true
  host: 0.0.0.0
  port: 8088
  path: /snapshot.jpg
skin_detection:
  enabled: true
  preset: auto
  min_pixels: 500
  visualize: true
  ir_luma_min: 35
  ir_luma_max: 245
  ir_grayscale_tolerance: 18
evm_visualization:
  enabled: true
  alpha: 25
  learning_rate: 0.05
  mode: inset
  source: frame
  inset_scale: 0.42
  subtle_only: true
  subtle_min_delta: 0.5
  subtle_max_delta: 8.0
  denoise_spatial_kernel: 5
  denoise_temporal_alpha: 0.35
  anchor: bottom_right
  margin: 24
overlay:
  enabled: true
  label: Nursery pulse
  min_confidence: 0.0
  position: [24, 48]
