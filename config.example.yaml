input_url: rtsp://1c4.local:8554/nursery
output_url: rtsp://1c4.local:8554/nursery-heart
roi:
  x: 100
  y: 90
  width: 320
  height: 180
processing:
  fps: 15
  min_bpm: 80
  max_bpm: 200
  window_seconds: 20
  use_opencl: true
output:
  width: 1152
  height: 648
