  alpha: 25
  learning_rate: 0.05
  mode: inset
  source: frame
  inset_scale: 0.42
  anchor: bottom_right
  margin: 24
overlay:
  enabled: true
  label: Nursery pulse
  min_confidence: 0.0
  position: [24, 48]
